<div class="main-content">

    <div class="card">

        <h1>Add Student</h1>

        <br>

        <input
            type="text"
            id="name"
            placeholder="Student Name"
        >

        <input
            type="text"
            id="father_name"
            placeholder="Father Name"
        >

        <input
            type="text"
            id="phone"
            placeholder="Phone"
        >

        <input
            type="text"
            id="class_name"
            placeholder="Class"
        >

        <input
            type="text"
            id="school_name"
            placeholder="School Name"
        >

        <input
            type="date"
            id="joining_date"
        >

        <textarea
            id="address"
            placeholder="Address"
        ></textarea>

        <button
            class="btn"
            onclick="addStudent()"
        >
            Add Student
        </button>

    </div>

</div>
