    <meta charset="UTF-8">

        content="width=device-width, initial-scale=1.0"
    >

        Messages
    </title>

    <link
        rel="stylesheet"
        href="../css/global.css"
    >

    <link
        rel="stylesheet"
        href="../css/messages.css"
    >

</head>

<body>

<div class="sidebar">

    <div class="logo">
        VANI ADMIN
    </div>

    <div class="nav-links">

        <a href="dashboard.html">
            Dashboard
        </a>

        <a href="classes.html">

        <a href="students.html">

        <a href="messages.html">

        </a>

            onclick="logout()"
        >
            Logout
        </a>

    </div>

</div>

<div class="main-content">

    <div class="dashboard-header">

        <div>

            <h1>
                Messages
            </h1>

            <p>
                Send Notice To Students
            </p>

        </div>

    </div>

    <br>

    <div class="card">

        <input
            type="text"
            id="messageTitle"
            placeholder="Message Title"
        >

        <textarea
            id="messageText"
            placeholder="Write Message..."
        ></textarea>

        <label>
            Select Class
        </label>

        <select id="messageClass">

            <option value="all">
                Send To All
            </option>

            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>

            <option value="Inter I Year">
                Inter I Year
            </option>

            <option value="Inter II Year">
                Inter II Year
            </option>

        </select>

        <button
            class="btn"
            onclick="sendMessage()"
        >
            Send Message
        </button>

    </div>

</div>
